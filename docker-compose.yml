# =============================================================================
# movie-finder-chain — Docker-only local development container
#
# Scope of this compose file:
#   - `chain` service for attached-container editing and one-off repo targets
#
# Deliberately excluded:
#   - Local Qdrant (Qdrant is always external)
#   - Backend app lifecycle (owned by movie-finder-backend)
# =============================================================================

name: movie-finder-chain-local

services:
  chain:
    build:
      context: ..
      dockerfile: chain/Dockerfile
      target: dev
    image: movie-finder-chain:dev
    working_dir: /workspace
    command: ["sleep", "infinity"]
    environment:
      GIT_DIR: /workspace/.gitdir
      GIT_WORK_TREE: /workspace
      # --- Qdrant ---
      QDRANT_URL: ${QDRANT_URL:-}
      QDRANT_API_KEY_RO: ${QDRANT_API_KEY_RO:-}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-movies}
      # --- LLM Providers ---
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # --- Models ---
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-large}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-3072}
      CLASSIFIER_MODEL: ${CLASSIFIER_MODEL:-claude-haiku-4-5-20251001}
      REASONING_MODEL: ${REASONING_MODEL:-claude-sonnet-4-6}
      # --- LangSmith ---
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-movie-finder}
      # --- Pipeline Logic ---
      RAG_TOP_K: ${RAG_TOP_K:-8}
      MAX_REFINEMENTS: ${MAX_REFINEMENTS:-3}
      IMDB_SEARCH_LIMIT: ${IMDB_SEARCH_LIMIT:-3}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.3}
      # --- Logging ---
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - .:/workspace:cached
      - ../imdbapi:/imdbapi:cached
      - ${CHAIN_GIT_DIR:-.git}:/workspace/.gitdir
      - uv_cache:/root/.cache/uv
      - pre_commit_cache:/root/.cache/pre-commit
    stdin_open: true
    tty: true
    init: true
    restart: "no"

volumes:
  uv_cache:
  pre_commit_cache:
