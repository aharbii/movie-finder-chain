# movie-finder-chain — Codex project configuration
# Scoped MCP servers for the LangGraph pipeline submodule.

approval_policy = "on-request"
model_reasoning_effort = "high"

[features]
multi_agent = true

[mcp_servers.github]
command = "/bin/sh"
args = ["-c", "GITHUB_PERSONAL_ACCESS_TOKEN=$(gh auth token) npx -y @modelcontextprotocol/server-github"]

[mcp_servers.qdrant-evaluator]
command = "uv"
args = ["run", "src/qdrant/main.py"]
cwd = "../../mcp/qdrant-explorer"
env_vars = [
  "OPENAI_API_KEY",
  "OPENAI_EMBEDDING_MODEL",
  "QDRANT_API_KEY_RO",
  "QDRANT_COLLECTION_NAME",
  "QDRANT_URL",
]

[mcp_servers.postgres]
command = "/bin/sh"
args = ["-lc", "exec npx -y @modelcontextprotocol/server-postgres \"$DATABASE_URL\""]
env_vars = ["DATABASE_URL"]

[mcp_servers.jenkins-local]
command = "npx"
args = ["-y", "@kud/mcp-jenkins@latest"]
env_vars = ["MCP_JENKINS_URL", "MCP_JENKINS_USER", "MCP_JENKINS_API_TOKEN"]
