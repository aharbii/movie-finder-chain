# =============================================================================
# movie-finder-chain — GitHub Actions CI
#
# Mirrors the Jenkins Multibranch pipeline 1:1.
# Both pipelines must remain in sync. Changes to build logic must be applied
# to both Jenkinsfile and this file.
#
# chain is an internal Python library, not a deployed service.
# No image is built or pushed — only Lint · Typecheck · Test.
#
# No required GitHub Actions secrets.
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # -------------------------------------------------------------------------- #
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (recursive submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize
        run: make init

      - name: Lint
        run: make lint

  # -------------------------------------------------------------------------- #
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (recursive submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize
        run: make init

      - name: Typecheck
        run: make typecheck

  # -------------------------------------------------------------------------- #
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (recursive submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize
        run: make init

      - name: Test with coverage
        run: make test-coverage

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            junit.xml
            coverage.xml
            htmlcov/
